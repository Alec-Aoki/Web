<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container {
            background-color: plum;
            height: 400px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            flex-wrap: nowrap;
            flex-direction: column;
        }
        div {
            background-color: orange;
            border: 1px solid gray;
            margin: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .c1 {
            width: 200px;
            height: 100px;
        }
        .c2 {
            width: 300px;
            height: 50px;
            order: 1;
        }
    </style>
</head>
<body>
    <section id="container">
        <div class="c1">1</div>
        <div class="c2">2</div>
        <div class="c1">3</div>
    </section>
</body>
</html>
