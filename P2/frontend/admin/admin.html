<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração - Poções e Soluções</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
        <h1>Poções e Soluções - Administração</h1>
        <p><a href="../loja/index.html">Voltar à loja</a></p>
    </header>

    <main>
        <section id="form-section">
            <h2>Cadastrar nova poção</h2>
            <form id="form-pocao">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" required>

                <label for="descricao">Descrição</label>
                <textarea id="descricao" name="descricao" required></textarea>

                <label for="imagem">URL da imagem</label>
                <input type="text" id="imagem" name="imagem" required>

                <label for="preco">Preço (em moedas)</label>
                <input type="number" id="preco" name="preco" min="0" required>

                <button type="submit">Cadastrar</button>
            </form>
        </section>

        <section id="lista-section">
            <h2>Poções Cadastradas</h2>
            <ul id="lista-pocoes">
                <!-- Vai ser preenchido dinamicamente c/ JS -->
            </ul>
        </section>
    </main>

    <script src="admin.js"></script>
</body>

</html>
